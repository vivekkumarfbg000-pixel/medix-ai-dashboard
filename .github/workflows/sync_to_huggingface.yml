name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          # 1. Setup git user details
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Add Hugging Face Space repository as a remote using token-based auth
          git remote add hf https://git:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_REPO.git
          
          # 3. Split the backend subdirectory into a temporary branch
          git subtree split --prefix medix-ai-backend -b hf-deploy
          
          # 4. Force push the temporary branch to the main branch of Hugging Face Spaces
          git push --force hf hf-deploy:main
