name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          # 1. Setup git user details
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Add Hugging Face Space repository as a remote
          git remote add hf https://a:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_REPO
          
          # 3. Push only the backend subdirectory to the hf remote
          git subtree push --prefix medix-ai-backend hf main --force
